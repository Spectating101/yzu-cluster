name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-mock-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Candidate identity unit tests
        run: npm run test:candidate-key

      - name: Production build
        run: npm run build
        env:
          # Match Pages artifact base path without poisoning the mock e2e dev server.
          YZU_PAGES: "true"

      - name: Mock e2e — Home
        run: mkdir -p .tmp-pw && TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-home.spec.js --reporter=dot
        env: &mock-env
          CI: "true"
          # Explicit: mock desk must serve at / so Playwright webServer url is 2xx.
          YZU_PAGES: "false"

      - name: Mock e2e — Parity
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-parity.spec.js --reporter=dot
        env: *mock-env

      - name: Mock e2e — Release visual contract
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/release-visual-convergence.spec.js --reporter=dot
        env: *mock-env

      - name: Mock e2e — Discover
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-discover.spec.js --reporter=dot
        env: *mock-env

      - name: Mock e2e — Library
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-library.spec.js --reporter=dot
        env: *mock-env

      - name: Mock e2e — Preview
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-preview.spec.js --reporter=dot
        env: *mock-env

      - name: Mock e2e — Synthesis
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-synthesis.spec.js --reporter=dot
        env: *mock-env

      - name: Mock e2e — Resources
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-resources.spec.js --reporter=dot
        env: *mock-env

      - name: Upload release visual renders
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: research-drive-release-visuals
          path: artifacts/release-visual
          if-no-files-found: warn
          retention-days: 14
