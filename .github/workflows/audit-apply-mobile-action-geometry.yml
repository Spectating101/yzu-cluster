name: Audit Apply Mobile Action Geometry

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/discover-responsive-finish
          fetch-depth: 0
      - name: Correct mobile action geometry
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('drive/src/v2/v2.css')
          css = p.read_text()

          box_needle = '  flex-shrink: 0;\n  max-width: 1080px;\n'
          assert box_needle in css
          css = css.replace(
              box_needle,
              '  flex-shrink: 0;\n  box-sizing: border-box;\n  max-width: 1080px;\n',
              1,
          )

          mobile_head = (
              '  .rd-v2-eval-workspace-shell > [data-testid="discover-eval-actions"] {\n'
              '    display: grid;\n'
              '    gap: 9px;\n'
          )
          assert mobile_head in css
          css = css.replace(
              mobile_head,
              '  .rd-v2-eval-workspace-shell > [data-testid="discover-eval-actions"] {\n'
              '    position: fixed;\n'
              '    right: 0;\n'
              '    bottom: 0;\n'
              '    left: 0;\n'
              '    z-index: 24;\n'
              '    display: grid;\n'
              '    gap: 9px;\n'
              '    max-width: none;\n'
              '    width: auto;\n'
              '    margin: 0;\n',
              1,
          )

          mobile_tail = (
              '    box-shadow: 0 -10px 24px rgba(2, 8, 18, 0.2);\n'
              '  }\n\n'
              '  .rd-v2-eval-actions-wide {\n'
          )
          assert mobile_tail in css
          css = css.replace(
              mobile_tail,
              '    box-shadow: 0 -10px 24px rgba(2, 8, 18, 0.2);\n'
              '  }\n\n'
              '  .rd-v2-eval-workspace {\n'
              '    padding-bottom: 132px;\n'
              '  }\n\n'
              '  .rd-v2-eval-actions-wide {\n',
              1,
          )

          p.write_text(css)
          PY
          git diff --check
      - name: Commit geometry correction
        run: |
          if git diff --quiet; then
            echo "No geometry patch required"
            exit 0
          fi
          git config user.name "ChatGPT Design Director"
          git config user.email "christstrife+chatgpt-design@users.noreply.github.com"
          git add drive/src/v2/v2.css
          git commit -m "fix(discover): stabilize mobile Focus action region"
          git push origin HEAD:design/discover-responsive-finish
