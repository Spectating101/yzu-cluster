name: Diagnose PR29 Synthesis e2e

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  diagnose:
    if: github.head_ref == 'agent/synthesis-construction-graph'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Capture Synthesis browser contract
        run: |
          set +e
          CI= npx playwright test e2e/v2-synthesis.spec.js --reporter=line --timeout=20000 --retries=0 > /tmp/synthesis-e2e.log 2>&1
          status=$?
          cat /tmp/synthesis-e2e.log > pr29-synthesis-e2e.txt
          echo "$status" > pr29-synthesis-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: pr29-synthesis-diagnostic-fast
          path: |
            pr29-synthesis-e2e.txt
            pr29-synthesis-status.txt
          retention-days: 1
