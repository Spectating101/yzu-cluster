name: Apply Synthesis mobile output correction

on:
  push:
    branches: [agent/synthesis-visual-studio]
    paths:
      - .github/workflows/apply-synthesis-mobile-output.yml

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synthesis-visual-studio
          fetch-depth: 0
      - name: Apply visual-review correction
        run: |
          python - <<'PY'
          from pathlib import Path

          page = Path('drive/src/v2/SynthesisPage.jsx')
          text = page.read_text()
          text = text.replace(
              'import { useEffect, useMemo, useState } from "react";',
              'import { useEffect, useMemo, useRef, useState } from "react";',
              1,
          )
          text = text.replace(
              '  const [runState, setRunState] = useState({ status: "idle", result: null, error: "" });\n',
              '  const [runState, setRunState] = useState({ status: "idle", result: null, error: "" });\n  const outputRef = useRef(null);\n',
              1,
          )
          text = text.replace(
              '      setRunState({ status: "success", result, error: "" });\n',
              '''      setRunState({ status: "success", result, error: "" });\n      window.requestAnimationFrame(() => {\n        if (window.matchMedia?.("(max-width: 720px)").matches) {\n          outputRef.current?.scrollIntoView({ behavior: "smooth", block: "center" });\n        }\n      });\n''',
              1,
          )
          text = text.replace(
              '<section className="rd-syn-output" aria-labelledby="rd-syn-output-title">',
              '<section ref={outputRef} className="rd-syn-output" aria-labelledby="rd-syn-output-title">',
              1,
          )
          page.write_text(text)

          css = Path('drive/src/v2/premium-synthesis.css')
          styles = css.read_text()
          styles = styles.replace('.rd-syn-source-dot.is-loading {\n.rd-syn-source-dot.is-loading {', '.rd-syn-source-dot.is-loading {', 1)
          styles = styles.replace('  flex-direction: column;\n  flex-direction: column;\n  gap: 4px;', '  flex-direction: column;\n  gap: 4px;', 1)
          css.write_text(styles)

          audit = Path('e2e/synthesis-visual-audit.spec.js')
          audit_text = audit.read_text()
          audit_text = audit_text.replace(
              '  await expect(page.getByTestId("synthesis-output-card")).toContainText("Registered in Library");\n  await shot(page, "05-mobile-registered-output");',
              '  await expect(page.getByTestId("synthesis-output-card")).toContainText("Registered in Library");\n  await page.waitForTimeout(700);\n  await shot(page, "05-mobile-registered-output");',
              1,
          )
          audit.write_text(audit_text)
          PY
      - name: Validate production build
        run: |
          npm ci
          npm run build
      - name: Publish correction and remove transport
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f .github/workflows/apply-synthesis-mobile-output.yml
          git add -A
          git commit -m "Deliver synthesis output on mobile"
          git push origin HEAD:agent/synthesis-visual-studio
