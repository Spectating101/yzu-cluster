name: Private runtime contract

on:
  pull_request:
    branches: [main]
    paths:
      - "drive/scripts/yzu_cluster/**"
      - "drive/scripts/research_data_mcp/**"
      - "tests/**"
      - ".github/agent_patches/**"
      - ".github/workflows/private-runtime-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/kernel:${{ github.workspace }}/drive
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pyyaml requests pandas numpy scipy statsmodels scikit-learn pyarrow networkx python-dotenv pydantic fastapi uvicorn structlog asyncpg redis prometheus-fastapi-instrumentator stripe email-validator openai paramiko aiohttp tabulate yfinance

      - name: Apply staged lease patch
        run: python .github/agent_patches/lease_scope.py

      - name: Compile runtime modules
        run: python -m compileall -q drive/scripts/yzu_cluster drive/scripts/research_data_mcp

      - name: Run focused lease contracts
        id: lease_focus
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          python -m pytest -vv tests/test_worker_control.py tests/test_worker_completion_lease.py tests/test_remote_worker.py tests/test_completion_lease_scope.py 2>&1 | tee lease-focus.log

      - name: Upload lease regression diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lease-focus-log
          path: lease-focus.log
          if-no-files-found: error
          retention-days: 3

      - name: Enforce focused lease result
        if: steps.lease_focus.outcome == 'failure'
        run: exit 1

      - name: Run scraper and registry authority contracts
        run: python -m pytest -q tests/test_scraper_manifest.py tests/test_registry_authority.py

      - name: Run private suite excluding optional HMM tests
        run: python -m pytest -q -k "not strategy_regime_hmm"

      - name: Run public interoperability contracts
        run: python -m unittest discover -s tests -p "test_yzu_interop_*.py" -v

      - name: Publish verified patch files
        uses: actions/upload-artifact@v4
        with:
          name: verified-lease-hardening
          path: |
            drive/scripts/yzu_cluster/orchestrator.py
            drive/scripts/yzu_cluster/remote_worker.py
            tests/test_completion_lease_scope.py
            .github/workflows/private-runtime-contract.yml
          if-no-files-found: error
          retention-days: 3
