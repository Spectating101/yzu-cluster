name: Apply Synthesis construction graph

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/synthesis-construction-graph'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synthesis-construction-graph
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Reconstruct verified product patch
        run: |
          cat .github/patches/synthesis-construction-graph-v2-* > /tmp/synthesis-construction-graph-v2.b64
          test "$(wc -c < /tmp/synthesis-construction-graph-v2.b64)" -eq 48652
          echo "ba53c571871a825861f8e71df4e31df9cb81e1c472423682d5109e0577f247f0  /tmp/synthesis-construction-graph-v2.b64" | sha256sum -c -
          base64 -d /tmp/synthesis-construction-graph-v2.b64 | gunzip > /tmp/synthesis-construction-graph-v2.patch
          echo "5632c42691273464d4af3bab3c36b52def8e7ec7805eef97f415f33eb179274a  /tmp/synthesis-construction-graph-v2.patch" | sha256sum -c -
      - name: Apply product patch
        run: |
          git apply --check /tmp/synthesis-construction-graph-v2.patch
          git apply /tmp/synthesis-construction-graph-v2.patch
          python - <<'PY'
          from pathlib import Path
          import json

          package = Path('package.json')
          data = json.loads(package.read_text())
          data['scripts']['test:synthesis-model'] = 'node --test drive/src/v2/synthesisWorkspace.test.js'
          package.write_text(json.dumps(data, indent=2) + '\n')
          PY
      - name: Validate construction model and production build
        run: |
          npm ci
          npm run test:synthesis-model
          npm run build
      - name: Commit validated product files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add drive/src/v2/App.jsx \
            drive/src/v2/InspectorRail.jsx \
            drive/src/v2/SynthesisGraphCanvas.jsx \
            drive/src/v2/SynthesisPage.jsx \
            drive/src/v2/SynthesisRailPanel.jsx \
            drive/src/v2/main.jsx \
            drive/src/v2/premium-synthesis.css \
            drive/src/v2/railContext.js \
            drive/src/v2/synthesisWorkspace.js \
            drive/src/v2/synthesisWorkspace.test.js \
            e2e/v2-synthesis.spec.js \
            package.json
          git diff --cached --stat
          git commit -m "Build Synthesis construction graph"
      - name: Rebase branch head
        run: |
          git fetch origin agent/synthesis-construction-graph
          git rebase origin/agent/synthesis-construction-graph
      - name: Push validated product files
        run: git push origin HEAD:agent/synthesis-construction-graph
