name: C1.1 screenshot export

on:
  pull_request:
    branches: [main]

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/upload-artifact@v4
        with:
          name: c11-screenshots
          path: docs/screenshots-review/polish-c1.1
          retention-days: 1
