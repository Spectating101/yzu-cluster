name: E4 Evaluation Visual Export

on:
  pull_request:
    branches: [main]

jobs:
  export-screenshots:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Upload E4 evaluation screenshots
        uses: actions/upload-artifact@v4
        with:
          name: e4-evaluation-screenshots
          path: docs/screenshots-review/discover-evaluation/
          if-no-files-found: error
          retention-days: 1
