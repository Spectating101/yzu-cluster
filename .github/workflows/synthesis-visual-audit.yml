name: Synthesis visual audit

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  render:
    if: github.head_ref == 'agent/synthesis-visual-studio'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Render Synthesis states
        run: mkdir -p .tmp-pw && TMPDIR=$PWD/.tmp-pw npx playwright test e2e/synthesis-visual-audit.spec.js
        env:
          CI: 'true'
          YZU_PAGES: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: synthesis-visual-audit
          path: docs/screenshots-review/synthesis-visual-audit/*.png
          retention-days: 2
