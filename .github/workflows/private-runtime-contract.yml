name: Private runtime contract

on:
  pull_request:
    branches: [main]
    paths:
      - "drive/scripts/yzu_cluster/**"
      - "drive/scripts/research_data_mcp/**"
      - "tests/**"
      - ".github/agent_patches/**"
      - ".github/workflows/private-runtime-contract.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  runtime-contract:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      PYTHONPATH: ${{ github.workspace }}:${{ github.workspace }}/kernel:${{ github.workspace }}/drive
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio pyyaml requests pandas numpy scipy statsmodels scikit-learn pyarrow networkx python-dotenv pydantic fastapi uvicorn structlog asyncpg redis prometheus-fastapi-instrumentator stripe email-validator openai paramiko aiohttp tabulate yfinance

      - name: Apply staged streaming transport patch
        run: |
          python .github/agent_patches/stream_remote.py
          python .github/agent_patches/stream_control.py
          python .github/agent_patches/stream_test.py

      - name: Compile runtime modules
        run: python -m compileall -q drive/scripts/yzu_cluster drive/scripts/research_data_mcp

      - name: Run streaming artifact contracts
        run: python -m pytest -q tests/test_artifact_streaming.py

      - name: Run worker, lease, and remote-agent contracts
        run: python -m pytest -q tests/test_worker_control.py tests/test_worker_completion_lease.py tests/test_completion_lease_scope.py tests/test_remote_worker.py

      - name: Run registry transaction and authority contracts
        run: python -m pytest -q tests/test_registry_transaction.py tests/test_registry_authority.py tests/test_scraper_manifest.py

      - name: Run private suite excluding optional HMM tests
        run: python -m pytest -q -k "not strategy_regime_hmm"

      - name: Run public interoperability contracts
        run: python -m unittest discover -s tests -p "test_yzu_interop_*.py" -v

      - name: Publish verified streaming files
        uses: actions/upload-artifact@v4
        with:
          name: verified-streaming-artifacts
          path: |
            drive/scripts/yzu_cluster/remote_worker.py
            drive/scripts/yzu_cluster/worker_control.py
            tests/test_artifact_streaming.py
          if-no-files-found: error
          retention-days: 3
