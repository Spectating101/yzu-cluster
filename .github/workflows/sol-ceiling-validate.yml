name: Sol ceiling validation

on:
  push:
    branches: [agent/sol-ceiling-research-instrument]
  pull_request:
    branches: [agent/rc3-semantic-research-desk]
  workflow_dispatch:

concurrency:
  group: sol-ceiling-${{ github.sha }}
  cancel-in-progress: false

jobs:
  build-and-visual-contracts:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Production build
        run: npm run build
        env:
          YZU_PAGES: "false"

      - name: Validate research value language
        continue-on-error: true
        run: npm run test:research-value

      - name: Render Sol ceiling pages
        if: always()
        env:
          CI: "true"
          YZU_PAGES: "false"
        run: |
          mkdir -p .tmp-pw artifacts/sol-ceiling
          TMPDIR=$PWD/.tmp-pw npx playwright test e2e/sol-ceiling-capture.spec.js --reporter=line

      - name: Upload visual evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sol-ceiling-validation-${{ github.sha }}
          path: |
            artifacts/sol-ceiling
            test-results
          if-no-files-found: ignore
          retention-days: 14
