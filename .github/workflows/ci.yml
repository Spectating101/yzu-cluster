name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-mock-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Candidate identity unit tests
        run: npm run test:candidate-key

      - name: Synthesis state unit tests
        run: npm run test:synthesis-model

      - name: Production build
        run: npm run build
        env:
          # Match Pages artifact base path without poisoning the mock e2e dev server.
          YZU_PAGES: "true"

      - name: Mock e2e (no live API)
        run: npm run test:v2-mock
        env:
          CI: "true"
          # Explicit: mock desk must serve at / so Playwright webServer url is 2xx.
          YZU_PAGES: "false"
