name: Audit Apply Discover Mobile Focus Regression

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/discover-mobile-focus-render-20260711
          fetch-depth: 0
      - name: Prepare bounded test patch and product branch
        run: |
          cp scripts/audit_add_discover_mobile_focus_regression.py /tmp/add_mobile_focus_regression.py
          git fetch origin design/discover-responsive-finish
          git checkout -B director-work origin/design/discover-responsive-finish
      - name: Add mobile Focus regression test
        run: |
          python3 /tmp/add_mobile_focus_regression.py
          git diff --check
          git diff -- e2e/v2-discover.spec.js
      - name: Commit regression test
        run: |
          if git diff --quiet; then
            echo "No regression test patch required"
            exit 0
          fi
          git config user.name "ChatGPT Design Director"
          git config user.email "christstrife+chatgpt-design@users.noreply.github.com"
          git add e2e/v2-discover.spec.js
          git commit -m "test(discover): lock mobile Focus rail ownership"
          git push origin HEAD:design/discover-responsive-finish
