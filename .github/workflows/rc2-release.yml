name: RC2 release gate

on:
  pull_request:
    branches: [main]
    paths:
      - "README.md"
      - "package.json"
      - ".gitignore"
      - "release/**"
      - "docs/releases/**"
      - "scripts/verify_rc2_release.mjs"
      - "scripts/package_rc2_release.sh"
      - "e2e/rc2-release-journey.spec.js"
      - ".github/workflows/rc2-release.yml"
  workflow_dispatch:
  push:
    tags:
      - "research-drive-rc2*"

jobs:
  clean-checkout-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out full release ancestry
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install JavaScript dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Verify frozen RC2 manifest and repository boundary
        run: npm run release:verify
        env:
          YZU_REQUIRE_RELEASE_ANCESTRY: "1"

      - name: Candidate identity contracts
        run: npm run test:candidate-key

      - name: Runtime interoperability contracts
        run: npm run test:runtime-contract

      - name: Dependency-free public reference runtime
        run: python -m unittest discover -s tests -p "test_yzu_interop_*.py" -v

      - name: Production build
        run: npm run build
        env:
          YZU_PAGES: "true"

      - name: Read-only professor release journey
        run: |
          mkdir -p .tmp-pw
          TMPDIR=$PWD/.tmp-pw npx playwright test e2e/rc2-release-journey.spec.js --reporter=line
        env:
          CI: "true"
          YZU_PAGES: "false"

      - name: Build deterministic RC2 package
        run: npm run release:package
        env:
          YZU_REQUIRE_RELEASE_ANCESTRY: "1"

      - name: Verify package archive
        run: |
          sha256sum -c artifacts/research-drive-rc2-public.tar.gz.sha256
          tar -tzf artifacts/research-drive-rc2-public.tar.gz
          test -f artifacts/rc2-release/research-drive-rc2/SHA256SUMS
          (
            cd artifacts/rc2-release/research-drive-rc2
            sha256sum -c SHA256SUMS
          )

      - name: Upload accepted public release package
        uses: actions/upload-artifact@v4
        with:
          name: research-drive-rc2-public
          path: |
            artifacts/research-drive-rc2-public.tar.gz
            artifacts/research-drive-rc2-public.tar.gz.sha256
            artifacts/rc2-release/research-drive-rc2
            test-results
          if-no-files-found: error
          retention-days: 30
