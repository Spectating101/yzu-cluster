name: Audit Apply Mobile Action Geometry

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/discover-responsive-finish
          fetch-depth: 0
      - name: Correct mobile action geometry
        run: |
          python3 - <<'PY'
          from pathlib import Path
          p = Path('drive/src/v2/v2.css')
          css = p.read_text()

          old = '''.rd-v2-eval-workspace-shell > [data-testid="discover-eval-actions"] {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            max-width: 1080px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px 16px;
            background: #0f1724;
          }
          '''
          new = '''.rd-v2-eval-workspace-shell > [data-testid="discover-eval-actions"] {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
            box-sizing: border-box;
            max-width: 1080px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px 16px;
            background: #0f1724;
          }
          '''
          assert old in css
          css = css.replace(old, new, 1)

          old = '''  .rd-v2-eval-workspace-shell > [data-testid="discover-eval-actions"] {
                display: grid;
                gap: 9px;
                padding: 10px 12px max(12px, env(safe-area-inset-bottom));
                border-top: 1px solid #2a3a52;
                background: rgba(15, 23, 36, 0.97);
                box-shadow: 0 -10px 24px rgba(2, 8, 18, 0.2);
              }
          '''
          new = '''  .rd-v2-eval-workspace-shell > [data-testid="discover-eval-actions"] {
                position: fixed;
                right: 0;
                bottom: 0;
                left: 0;
                z-index: 24;
                display: grid;
                gap: 9px;
                max-width: none;
                width: auto;
                margin: 0;
                padding: 10px 12px max(12px, env(safe-area-inset-bottom));
                border-top: 1px solid #2a3a52;
                background: rgba(15, 23, 36, 0.97);
                box-shadow: 0 -10px 24px rgba(2, 8, 18, 0.2);
              }

              .rd-v2-eval-workspace {
                padding-bottom: 132px;
              }
          '''
          assert old in css
          css = css.replace(old, new, 1)
          p.write_text(css)
          PY
          git diff --check
      - name: Commit geometry correction
        run: |
          if git diff --quiet; then
            echo "No geometry patch required"
            exit 0
          fi
          git config user.name "ChatGPT Design Director"
          git config user.email "christstrife+chatgpt-design@users.noreply.github.com"
          git add drive/src/v2/v2.css
          git commit -m "fix(discover): stabilize mobile Focus action region"
          git push origin HEAD:design/discover-responsive-finish
