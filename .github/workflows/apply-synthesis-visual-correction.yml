name: Apply Synthesis visual correction

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  correct:
    if: github.head_ref == 'agent/synthesis-construction-graph'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synthesis-construction-graph
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Apply picture-first correction
        run: |
          python - <<'PY'
          from pathlib import Path

          p = Path('drive/src/v2/SynthesisPage.jsx')
          s = p.read_text()
          s = s.replace('    setSelectedNodeId(project.proposal?.nodeId || "");\n    setActivityOpen(true);\n', '    setSelectedNodeId(project.proposal?.nodeId || "");\n', 1)
          s = s.replace('    setSelectedNodeId("");\n    setActivityOpen(true);\n', '    setSelectedNodeId("");\n', 1)
          p.write_text(s)

          p = Path('drive/src/v2/SynthesisGraphCanvas.jsx')
          s = p.read_text()
          s = s.replace('  target: { width: 344, height: 138 },\n  construct: { width: 226, height: 104 },\n  source: { width: 258, height: 132 },\n  process: { width: 258, height: 116 },\n  output: { width: 326, height: 150 },', '  target: { width: 310, height: 118 },\n  construct: { width: 200, height: 86 },\n  source: { width: 226, height: 110 },\n  process: { width: 226, height: 98 },\n  output: { width: 294, height: 128 },', 1)
          s = s.replace('      "elk.spacing.nodeNode": "42",\n      "elk.layered.spacing.nodeNodeBetweenLayers": "76",', '      "elk.spacing.nodeNode": "34",\n      "elk.layered.spacing.nodeNodeBetweenLayers": "54",', 1)
          s = s.replace('      "elk.padding": "[top=52,left=54,bottom=52,right=54]",', '      "elk.padding": "[top=34,left=38,bottom=34,right=38]",', 1)
          s = s.replace('fitView({ padding: 0.15, duration: 520, minZoom: 0.46, maxZoom: 1.2 });', 'fitView({ padding: 0.06, duration: 520, minZoom: 0.58, maxZoom: 1.08 });', 1)
          s = s.replace('        minZoom={0.4}', '        minZoom={0.5}', 1)
          s = s.replace('        proOptions={{ hideAttribution: false }}', '        proOptions={{ hideAttribution: true }}', 1)
          p.write_text(s)

          p = Path('drive/src/v2/synthesisWorkspace.js')
          s = p.read_text()
          s = s.replace('{ op: "update_node", id: "gdelt", patch: { status: "queryable", eyebrow: "Reachable source", role: "Validation signal", proposalId: null } },', '{ op: "update_node", id: "gdelt", patch: { status: "queryable", eyebrow: "Reachable source", role: "Validation signal", progress: ["Indexed", "Capability known", "Query design pending"], proposalId: null } },', 1)
          s = s.replace('{ op: "update_edge", id: "gdelt-output", patch: { relation: "validates", label: "validates" } },\n      { op: "append_activity", message: "GDELT approved as a validation signal." },', '{ op: "update_edge", id: "gdelt-output", patch: { relation: "validates", label: "validates" } },\n      { op: "update_spec", patch: { validation: [["GDELT", "News coverage · external validation"]] } },\n      { op: "append_activity", message: "GDELT approved as a validation signal." },', 1)
          s = s.replace('const ALLOWED_PATCH_OPS = new Set(["update_node", "add_node", "remove_node", "update_edge", "add_edge", "append_activity"]);', 'const ALLOWED_PATCH_OPS = new Set(["update_node", "add_node", "remove_node", "update_edge", "add_edge", "update_spec", "append_activity"]);', 1)
          s = s.replace('    } else if (operation.op === "append_activity") {\n      next.activity.push({ time: "Now", kind: "change", message: operation.message || "Synthesis state updated." });\n', '    } else if (operation.op === "update_spec") {\n      next.spec = { ...(next.spec || {}), ...(operation.patch || {}) };\n    } else if (operation.op === "append_activity") {\n      next.activity.push({ time: "Now", kind: "change", message: operation.message || "Synthesis state updated." });\n', 1)
          p.write_text(s)

          p = Path('drive/src/v2/synthesisWorkspace.test.js')
          s = p.read_text()
          s = s.replace('  assert.equal(edge.relation, "validates");\n  assert.equal(next.proposal, null);', '  assert.equal(edge.relation, "validates");\n  assert.deepEqual(next.spec.validation, [["GDELT", "News coverage · external validation"]]);\n  assert.deepEqual(gdelt.progress, ["Indexed", "Capability known", "Query design pending"]);\n  assert.equal(next.proposal, null);', 1)
          p.write_text(s)

          p = Path('drive/src/v2/premium-synthesis.css')
          s = p.read_text()
          s = s.replace('.rd-syn-map-view { position: relative; }', '.rd-syn-map-view {\n  position: relative;\n  display: grid;\n  grid-template-rows: minmax(0,1fr) auto;\n  background: #0d1222;\n}', 1)
          s = s.replace('.rd-syn-graph-node.is-dimmed { opacity: .2; }', '.rd-syn-graph-node.is-dimmed { opacity: .42; }', 1)
          s = s.replace('.react-flow__edge-path.rd-syn-semantic-edge.is-dimmed { opacity: .1; }', '.react-flow__edge-path.rd-syn-semantic-edge.is-dimmed { opacity: .2; }', 1)
          start = s.index('.rd-syn-proposal {')
          end = s.index('/* ── Specification view', start)
          proposal_css = '''.rd-syn-proposal {\n  position: relative;\n  z-index: 12;\n  display: grid;\n  grid-template-columns: 28px minmax(0,1fr) auto;\n  align-items: center;\n  gap: 10px;\n  min-height: 54px;\n  padding: 8px 10px;\n  border: 0;\n  border-top: 1px solid rgba(231,179,89,.46);\n  border-radius: 0;\n  background: rgba(255,251,241,.985);\n  color: #2c2a27;\n  box-shadow: 0 -8px 24px rgba(0,0,0,.08);\n}\n.rd-syn-proposal-mark { width: 28px; height: 28px; display: grid; place-items: center; border-radius: 9px; background: linear-gradient(145deg, #f1c56f, #dda344); color: #fff; box-shadow: 0 6px 14px rgba(192,133,37,.22); }\n.rd-syn-proposal-copy { min-width: 0; }\n.rd-syn-proposal-copy > span { display: block; margin-bottom: 1px; color: #a76b17; font-size: 7.4px; font-weight: 820; letter-spacing: .1em; text-transform: uppercase; }\n.rd-syn-proposal-copy strong { display: block; color: #2c2924; font-size: 11px; }\n.rd-syn-proposal-copy p { margin: 2px 0 0; overflow: hidden; color: #6f665a; font-size: 8.5px; line-height: 1.25; text-overflow: ellipsis; white-space: nowrap; }\n.rd-syn-proposal-copy > div { display: none; }\n.rd-syn-proposal-actions { display: flex; align-items: center; gap: 5px; }\n.rd-syn-proposal-actions button { min-height: 28px; padding: 0 8px; border: 1px solid #d9c8a7; border-radius: 8px; background: #fff; color: #625540; cursor: pointer; font: inherit; font-size: 8.3px; font-weight: 700; }\n.rd-syn-proposal-actions button.primary { border-color: #d59c3f; background: #e3a94b; color: #fff; box-shadow: 0 6px 13px rgba(191,130,31,.18); }\n.rd-syn-proposal-actions button.quiet { border-color: transparent; background: transparent; color: #90816d; }\n\n'''
          s = s[:start] + proposal_css + s[end:]
          p.write_text(s)
          PY
      - name: Validate correction
        run: |
          npm ci
          npm run test:synthesis-model
          npm run build
      - name: Commit corrected product files
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add drive/src/v2/SynthesisGraphCanvas.jsx \
            drive/src/v2/SynthesisPage.jsx \
            drive/src/v2/premium-synthesis.css \
            drive/src/v2/synthesisWorkspace.js \
            drive/src/v2/synthesisWorkspace.test.js
          git diff --cached --stat
          git commit -m "Refine Synthesis graph composition"
      - name: Rebase branch head
        run: |
          git fetch origin agent/synthesis-construction-graph
          git rebase origin/agent/synthesis-construction-graph
      - name: Push corrected product files
        run: git push origin HEAD:agent/synthesis-construction-graph
