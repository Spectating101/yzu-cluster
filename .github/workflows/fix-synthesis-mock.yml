name: Fix synthesis mock routing

on:
  push:
    branches: [agent/synthesis-visual-studio]
    paths:
      - .github/workflows/fix-synthesis-mock.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synthesis-visual-studio
          fetch-depth: 0
      - name: Preserve explicit synthesis endpoint contracts
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('e2e/fixtures/v2MockApi.js')
          text = path.read_text()
          old = '''  await page.route("**/library/synthesis/*", (route) => {\n    const id = decodeURIComponent(route.request().url().split("/library/synthesis/")[1]?.split("?")[0] || "");\n    const profile =\n'''
          new = '''  await page.route("**/library/synthesis/*", (route) => {\n    const id = decodeURIComponent(route.request().url().split("/library/synthesis/")[1]?.split("?")[0] || "");\n    // This wildcard is registered last, so let the explicit profile/run/pair routes handle their contracts.\n    if (["profiles", "run", "pair"].includes(id)) return route.continue();\n    const profile =\n'''
          if old not in text:
              raise SystemExit('mock routing target not found')
          path.write_text(text.replace(old, new))
          PY
      - name: Publish correction and remove transport
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f .github/workflows/fix-synthesis-mock.yml
          git add -A
          git commit -m "Fix synthesis mock endpoint routing"
          git push origin HEAD:agent/synthesis-visual-studio
