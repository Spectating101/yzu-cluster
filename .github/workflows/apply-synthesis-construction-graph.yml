name: Apply Synthesis construction graph

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  apply:
    if: github.head_ref == 'agent/synthesis-construction-graph'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synthesis-construction-graph
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Reconstruct verified product patch
        run: |
          cat .github/patches/synthesis-construction-graph-0* > /tmp/synthesis-construction-graph.b64
          test "$(wc -c < /tmp/synthesis-construction-graph.b64)" -eq 34552
          echo "e4376ff295cf82d08941306055b57706684a2d2b657448fca080f608681c6746  /tmp/synthesis-construction-graph.b64" | sha256sum -c -
          base64 -d /tmp/synthesis-construction-graph.b64 | gunzip > /tmp/synthesis-construction-graph.patch
          echo "47addf0dd61f2cd23261cb6eb3fc8bcc8329d479de4150ac9ec6d32a27b207c6  /tmp/synthesis-construction-graph.patch" | sha256sum -c -
      - name: Apply product patch
        run: |
          git apply --check /tmp/synthesis-construction-graph.patch
          git apply /tmp/synthesis-construction-graph.patch
          python - <<'PY'
          from pathlib import Path
          import json

          package = Path('package.json')
          data = json.loads(package.read_text())
          data['scripts']['test:synthesis-model'] = 'node --test drive/src/v2/synthesisWorkspace.test.js'
          package.write_text(json.dumps(data, indent=2) + '\n')

          ci = Path('.github/workflows/ci.yml')
          text = ci.read_text()
          needle = '      - name: Candidate identity unit tests\n        run: npm run test:candidate-key\n\n'
          replacement = needle + '      - name: Synthesis state unit tests\n        run: npm run test:synthesis-model\n\n'
          if 'Synthesis state unit tests' not in text:
              if needle not in text:
                  raise SystemExit('CI insertion point not found')
              text = text.replace(needle, replacement, 1)
          ci.write_text(text)
          PY
      - name: Validate construction model and production build
        id: validate
        continue-on-error: true
        run: |
          mkdir -p diagnostics
          set -o pipefail
          npm ci 2>&1 | tee diagnostics/npm-ci.log
          npm run test:synthesis-model 2>&1 | tee diagnostics/synthesis-model.log
          npm run build 2>&1 | tee diagnostics/build.log
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: synthesis-graph-apply-diagnostics
          path: diagnostics/*.log
          if-no-files-found: warn
          retention-days: 1
      - name: Publish implementation and remove patch transport
        if: steps.validate.outcome == 'success'
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          rm -f .github/patches/synthesis-construction-graph.b64
          rm -f .github/patches/synthesis-construction-graph-0*
          rm -f .github/workflows/apply-synthesis-construction-graph.yml
          git add -A
          git commit -m "Build Synthesis construction graph"
          git push origin HEAD:agent/synthesis-construction-graph
      - name: Preserve validation failure
        if: steps.validate.outcome == 'failure'
        run: exit 1
