name: Fix Synthesis graph box model

on:
  push:
    branches: [agent/synthesis-construction-graph]
    paths:
      - .github/workflows/fix-synthesis-graph-box-model.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synthesis-construction-graph
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Match rendered node boxes to ELK dimensions
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('drive/src/v2/premium-synthesis.css')
          text = path.read_text()
          needle = '.rd-syn-graph-node {\n  position: relative;\n  width: 100%;\n  height: 100%;\n'
          replacement = '.rd-syn-graph-node {\n  position: relative;\n  box-sizing: border-box;\n  width: 100%;\n  height: 100%;\n'
          if needle not in text:
              raise SystemExit('graph node box-model target not found')
          path.write_text(text.replace(needle, replacement, 1))
          PY
      - name: Validate product
        run: |
          npm ci
          npm run test:synthesis-model
          npm run build
      - name: Publish box-model fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add drive/src/v2/premium-synthesis.css
          git commit -m "Fix Synthesis graph node geometry"
          git push origin HEAD:agent/synthesis-construction-graph
