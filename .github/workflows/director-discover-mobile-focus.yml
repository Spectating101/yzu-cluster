name: Director Discover Mobile Focus

on:
  push:
    branches: [design/discover-responsive-finish]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: design/discover-responsive-finish
          fetch-depth: 0

      - name: Apply bounded mobile Focus design
        run: |
          python3 - <<'PY'
          from pathlib import Path

          jsx_path = Path("drive/src/v2/DiscoverEvaluationSurface.jsx")
          css_path = Path("drive/src/v2/v2.css")
          jsx = jsx_path.read_text()
          css = css_path.read_text()

          marker = "rd-v2-eval-actions-mobile"
          if marker in jsx:
              print("Mobile Focus design already applied")
              raise SystemExit(0)

          old = '''  const secondary = lifecycle?.primaryAction
              ? lifecycle.secondaryActions || []
              : actions.secondary;
            const sufficiencyDifferences = (sufficiency?.differences || []).filter(
          '''
          new = '''  const secondary = lifecycle?.primaryAction
              ? lifecycle.secondaryActions || []
              : actions.secondary;
            const mobileSecondary = (() => {
              if (lifecycle?.primaryAction || !secondary.length) return null;
              const preferredIds =
                sufficiency?.state === SUFFICIENCY.EXACT_LOCAL
                  ? ["preview", "probe", "ask"]
                  : sufficiency?.state === SUFFICIENCY.PARTIAL_LOCAL ||
                      sufficiency?.state === SUFFICIENCY.RELATED_LOCAL
                    ? ["open_local", "inspect_related", "preview", "probe", "ask"]
                    : ["preview", "open_local", "inspect_related", "probe", "ask"];
              return preferredIds
                .map((id) => secondary.find((action) => action.id === id))
                .find(Boolean) || secondary[0];
            })();
            const mobileOverflowActions = secondary.filter((action) => action.id !== mobileSecondary?.id);
            const mobileSecondaryLabel =
              mobileSecondary?.id === "preview" && sufficiency?.state === SUFFICIENCY.EXACT_LOCAL
                ? "Inspect external source"
                : mobileSecondary?.label;
            const sufficiencyDifferences = (sufficiency?.differences || []).filter(
          '''
          assert old in jsx
          jsx = jsx.replace(old, new, 1)

          old = '''      <div className="rd-v2-eval-actions" data-testid="discover-eval-actions">
                {probeLoading || submitting ? (
                  <p className="rd-v2-eval-action-status">{submitting ? "Submitting…" : "Probing source…"}</p>
                ) : null}
                <button
                  type="button"
                  className="rd-v2-btn primary"
                  disabled={probeLoading || submitting}
                  onClick={() => runAction(primary.id)}
                >
                  {primary.label}
                </button>
                {secondary.map((action) => (
                  <button
                    key={action.id}
                    type="button"
                    className="rd-v2-btn"
                    disabled={probeLoading || submitting}
                    onClick={() => runAction(action.id)}
                  >
                    {action.label}
                  </button>
                ))}
              </div>
          '''
          new = '''      <div className="rd-v2-eval-actions" data-testid="discover-eval-actions">
                {probeLoading || submitting ? (
                  <p className="rd-v2-eval-action-status">{submitting ? "Submitting…" : "Probing source…"}</p>
                ) : null}

                <div className="rd-v2-eval-actions-wide">
                  <button
                    type="button"
                    className="rd-v2-btn primary"
                    disabled={probeLoading || submitting}
                    onClick={() => runAction(primary.id)}
                  >
                    {primary.label}
                  </button>
                  {secondary.map((action) => (
                    <button
                      key={action.id}
                      type="button"
                      className="rd-v2-btn"
                      disabled={probeLoading || submitting}
                      onClick={() => runAction(action.id)}
                    >
                      {action.label}
                    </button>
                  ))}
                </div>

                <div className="rd-v2-eval-actions-mobile" aria-label="Focused candidate actions">
                  <button
                    type="button"
                    className="rd-v2-btn primary rd-v2-eval-mobile-primary"
                    disabled={probeLoading || submitting}
                    onClick={() => runAction(primary.id)}
                  >
                    {primary.label}
                  </button>

                  {mobileSecondary || mobileOverflowActions.length ? (
                    <div className="rd-v2-eval-mobile-secondary-row">
                      {mobileSecondary ? (
                        <button
                          type="button"
                          className="rd-v2-eval-mobile-secondary"
                          disabled={probeLoading || submitting}
                          onClick={() => runAction(mobileSecondary.id)}
                        >
                          {mobileSecondaryLabel}
                        </button>
                      ) : (
                        <span />
                      )}

                      {mobileOverflowActions.length ? (
                        <details className="rd-v2-eval-action-menu">
                          <summary aria-label="More actions">•••</summary>
                          <div className="rd-v2-eval-action-menu-popover">
                            {mobileOverflowActions.map((action) => (
                              <button
                                key={action.id}
                                type="button"
                                disabled={probeLoading || submitting}
                                onClick={(event) => {
                                  runAction(action.id);
                                  event.currentTarget.closest("details")?.removeAttribute("open");
                                }}
                              >
                                {action.label}
                              </button>
                            ))}
                          </div>
                        </details>
                      ) : null}
                    </div>
                  ) : null}
                </div>
              </div>
          '''
          assert old in jsx
          jsx = jsx.replace(old, new, 1)
          jsx_path.write_text(jsx)

          anchor = '''.rd-v2-eval-workspace-shell > [data-testid="discover-eval-actions"] {
            flex-shrink: 0;
            max-width: 1080px;
            width: 100%;
            margin: 0 auto;
            padding: 0 20px 16px;
            background: #0f1724;
          }
          '''
          addition = anchor + '''
          .rd-v2-eval-actions-wide {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
          }

          .rd-v2-eval-actions-mobile {
            display: none;
          }

          @media (max-width: 760px) {
            .rd-v2-eval-workspace-shell > [data-testid="discover-eval-actions"] {
              padding: 10px 12px max(12px, env(safe-area-inset-bottom));
              border-top: 1px solid #2a3a52;
              background: rgba(15, 23, 36, 0.97);
              box-shadow: 0 -10px 24px rgba(2, 8, 18, 0.2);
            }

            .rd-v2-eval-actions-wide {
              display: none;
            }

            .rd-v2-eval-actions-mobile {
              display: grid;
              gap: 9px;
            }

            .rd-v2-eval-mobile-primary {
              width: 100%;
              min-height: 44px;
              justify-content: center;
              font-weight: 700;
            }

            .rd-v2-eval-mobile-secondary-row {
              display: flex;
              align-items: center;
              justify-content: space-between;
              min-height: 32px;
              gap: 12px;
            }

            .rd-v2-eval-mobile-secondary {
              min-width: 0;
              padding: 4px 0;
              border: 0;
              background: transparent;
              color: #a9bad0;
              cursor: pointer;
              font: inherit;
              font-size: 12.5px;
              font-weight: 650;
              text-align: left;
            }

            .rd-v2-eval-mobile-secondary:disabled {
              cursor: default;
              opacity: 0.55;
            }

            .rd-v2-eval-action-menu {
              position: relative;
              flex: 0 0 auto;
            }

            .rd-v2-eval-action-menu > summary {
              display: grid;
              place-items: center;
              width: 38px;
              height: 32px;
              border: 1px solid #2a3a52;
              border-radius: 8px;
              background: #121c2b;
              color: #a9bad0;
              cursor: pointer;
              font-size: 16px;
              font-weight: 700;
              letter-spacing: 0.08em;
              list-style: none;
            }

            .rd-v2-eval-action-menu > summary::-webkit-details-marker {
              display: none;
            }

            .rd-v2-eval-action-menu-popover {
              position: absolute;
              right: 0;
              bottom: calc(100% + 8px);
              z-index: 8;
              display: grid;
              min-width: min(260px, calc(100vw - 24px));
              padding: 6px;
              border: 1px solid #33445f;
              border-radius: 10px;
              background: #121c2b;
              box-shadow: 0 18px 40px rgba(2, 8, 18, 0.46);
            }

            .rd-v2-eval-action-menu-popover button {
              width: 100%;
              padding: 10px 11px;
              border: 0;
              border-radius: 7px;
              background: transparent;
              color: #dbe5f3;
              cursor: pointer;
              font: inherit;
              font-size: 13px;
              font-weight: 600;
              text-align: left;
            }

            .rd-v2-eval-action-menu-popover button:hover,
            .rd-v2-eval-action-menu-popover button:focus-visible {
              background: rgba(88, 140, 220, 0.12);
              outline: none;
            }
          }
          '''
          assert anchor in css
          css = css.replace(anchor, addition, 1)
          css_path.write_text(css)
          PY

          git diff --check
          git diff -- drive/src/v2/DiscoverEvaluationSurface.jsx drive/src/v2/v2.css

      - name: Commit bounded design patch
        run: |
          if git diff --quiet; then
            echo "No patch required"
            exit 0
          fi
          git config user.name "ChatGPT Design Director"
          git config user.email "christstrife+chatgpt-design@users.noreply.github.com"
          git add drive/src/v2/DiscoverEvaluationSurface.jsx drive/src/v2/v2.css
          git commit -m "design(discover): focus mobile actions on one decision"
          git push origin HEAD:design/discover-responsive-finish
