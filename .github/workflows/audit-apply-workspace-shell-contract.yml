name: Audit Apply Workspace Shell Contract

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: audit/discover-mobile-focus-render-20260711
          fetch-depth: 0
      - name: Prepare bounded patch script and product branch
        run: |
          cp scripts/audit_restore_discover_workspace_shell.py /tmp/restore_workspace_shell.py
          git fetch origin design/discover-responsive-finish
          git checkout -B director-work origin/design/discover-responsive-finish
      - name: Restore workspace shell contract
        run: |
          python3 /tmp/restore_workspace_shell.py
          git diff --check
          git diff -- drive/src/v2/DiscoverEvaluationSurface.jsx drive/src/v2/v2.css
      - name: Commit shell correction
        run: |
          if git diff --quiet; then
            echo "No shell correction required"
            exit 0
          fi
          git config user.name "ChatGPT Design Director"
          git config user.email "christstrife+chatgpt-design@users.noreply.github.com"
          git add drive/src/v2/DiscoverEvaluationSurface.jsx drive/src/v2/v2.css
          git commit -m "fix(discover): restore Focus workspace shell contract"
          git push origin HEAD:design/discover-responsive-finish
