name: Current product review export

on:
  pull_request:
    branches: [main]

jobs:
  render-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Render current Library states
        continue-on-error: true
        run: |
          mkdir -p .tmp-pw
          TMPDIR=$PWD/.tmp-pw npx playwright test e2e/library-estate-screenshots.spec.js --retries=0
        env:
          CI: "true"
          YZU_PAGES: "false"

      - name: Render current Discover composition
        continue-on-error: true
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/discover-composition-screenshots.spec.js --retries=0
        env:
          CI: "true"
          YZU_PAGES: "false"

      - name: Render current Discover sufficiency
        continue-on-error: true
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/discover-sufficiency-screenshots.spec.js --retries=0
        env:
          CI: "true"
          YZU_PAGES: "false"

      - name: Render current Discover lifecycle
        continue-on-error: true
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/discover-lifecycle-screenshots.spec.js --retries=0
        env:
          CI: "true"
          YZU_PAGES: "false"

      - name: Render current Discover evaluation
        continue-on-error: true
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/discover-evaluation-screenshots.spec.js --retries=0
        env:
          CI: "true"
          YZU_PAGES: "false"

      - name: Render uniquely named current product surfaces
        run: TMPDIR=$PWD/.tmp-pw npx playwright test e2e/current-product-review-audit.spec.js --retries=0
        env:
          CI: "true"
          YZU_PAGES: "false"

      - name: Capture current Home Profile Resources and Library shell
        continue-on-error: true
        run: |
          npm run dev -- --port 5179 > /tmp/yzu-vite.log 2>&1 &
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:5179/ >/dev/null; then break; fi
            sleep 1
          done
          CAPTURE_VIEWPORTS=desktop,mobile \
          CAPTURE_ROUTES=home,home-signed-in,profile,resources,library \
          YZU_DESK_URL=http://127.0.0.1:5179 \
          node scripts/capture_desk_screenshots.mjs
        env:
          CI: "true"
          YZU_PAGES: "false"

      - name: Upload rendered review evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: current-product-review-pngs
          path: |
            docs/screenshots-review
            research-drive-screenshots.zip
            research-drive-chatgpt-packet.zip
          if-no-files-found: error
          retention-days: 1
