name: Private Runtime Contract

on:
  pull_request:
  push:
    branches:
      - main
      - terra/runtime-integration

jobs:
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pandas numpy scipy statsmodels scikit-learn pyyaml python-dotenv networkx pyarrow fastapi uvicorn pydantic yfinance
      - name: Private runtime suite
        run: PYTHONPATH=drive:kernel python -m pytest -q -k "not strategy_regime_hmm"
      - name: Public interoperability reference suite
        run: PYTHONPATH=drive:kernel python -m unittest discover -s tests -p "test_yzu_interop_*.py" -v
      - name: Compile runtime modules
        run: python -m compileall -q drive/scripts/yzu_cluster drive/scripts/research_data_mcp
