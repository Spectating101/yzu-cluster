name: Fix Synthesis minimap hitbox

on:
  push:
    branches: [agent/synthesis-construction-graph]
    paths:
      - .github/workflows/fix-synthesis-minimap-hitbox.yml

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synthesis-construction-graph
          fetch-depth: 0
      - name: Make minimap overview-only
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('drive/src/v2/SynthesisGraphCanvas.jsx')
          text = path.read_text()
          old = '''        <MiniMap
          pannable
          zoomable
          className="rd-syn-minimap"'''
          new = '''        <MiniMap
          pannable={false}
          zoomable={false}
          className="rd-syn-minimap"'''
          if old not in text:
              raise SystemExit('minimap target not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Publish product fix
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add drive/src/v2/SynthesisGraphCanvas.jsx
          git commit -m "Prevent Synthesis minimap from blocking nodes"
          git pull --rebase origin agent/synthesis-construction-graph
          git push origin HEAD:agent/synthesis-construction-graph
