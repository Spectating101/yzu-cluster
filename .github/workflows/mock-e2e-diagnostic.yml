name: Mock e2e diagnostic

on:
  pull_request:
    branches: [main]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium --with-deps
      - name: Run corrected interaction and shell contracts
        run: |
          mkdir -p .tmp-pw
          TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-home.spec.js --retries=0 --max-failures=1 -g "Continue opens dataset preview"
          TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-parity.spec.js --retries=0 --max-failures=1 -g "shell grid keeps adaptive rail proportions"
          TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-discover.spec.js --retries=0 --max-failures=1 -g "mobile Discover Focus owns the viewport"
          TMPDIR=$PWD/.tmp-pw npx playwright test e2e/v2-resources.spec.js --retries=0 --max-failures=1 -g "right rail starts with operational posture"
        env:
          CI: "true"
          YZU_PAGES: "false"
