name: Focus Synthesis graph entry

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  focus:
    if: github.head_ref == 'agent/synthesis-construction-graph'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/synthesis-construction-graph
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - name: Focus entry viewport on target and evidence
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('drive/src/v2/SynthesisGraphCanvas.jsx')
          text = path.read_text()
          old = '''        window.requestAnimationFrame(() => {
          fitView({ padding: 0.06, duration: 520, minZoom: 0.58, maxZoom: 1.08 });
        });'''
          new = '''        window.requestAnimationFrame(() => {
          const mobile = window.matchMedia?.("(max-width: 720px)").matches;
          const entryNodes = next.nodes.filter((node) =>
            node.data?.layer === "target" || node.data?.layer === "evidence"
          );
          fitView(
            mobile
              ? { padding: 0.06, duration: 520, minZoom: 0.58, maxZoom: 1.08 }
              : { nodes: entryNodes, padding: 0.08, duration: 520, minZoom: 0.58, maxZoom: 0.82 },
          );
        });'''
          if old not in text:
              raise SystemExit('entry fit target not found')
          path.write_text(text.replace(old, new, 1))
          PY
      - name: Validate product
        run: |
          npm ci
          npm run test:synthesis-model
          npm run build
      - name: Publish viewport focus
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add drive/src/v2/SynthesisGraphCanvas.jsx
          git commit -m "Focus Synthesis map on research evidence"
          git push origin HEAD:agent/synthesis-construction-graph
